# .claude/ and .agents/ ship vendored reference material (e.g. mcp-builder's
# example scripts) that isn't held to this project's lint config — same scoping
# as the Makefile's LINT_PATHS (see its comment there).
exclude: ^(\.claude|\.agents)/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=10000"]
      - id: check-merge-conflict
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-json
      - id: check-ast
      - id: detect-private-key
      - id: trailing-whitespace
      - id: end-of-file-fixer

  # Same [tool.ruff] config as pyproject.toml — one source of truth for lint
  # rules, two enforcement paths (this + .claude/hooks/code_quality.sh.jinja).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        name: detect secrets (gitleaks)

  - repo: local
    hooks:
      - id: no-dotenv-staged
        name: .env not staged
        language: fail
        entry: ".env file must not be committed — use .env.example for templates"
        files: ^\.env$
