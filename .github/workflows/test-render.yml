name: Test template renders

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- render+lint tier ---
          # (no plain "defaults" row — defaults-tested below renders the same
          # config and additionally runs the test suite, fully subsuming it)
          - name: layering-only
            args: "-d project_type=existing_repo"
          - name: project_type-mcp_server
            args: "-d project_type=mcp_server"
          - name: project_type-eval_suite
            args: "-d project_type=eval_suite"
          - name: project_type-ai_backend
            args: "-d project_type=ai_backend"
          - name: primary_chat_agent-lg_agent
            args: "-d primary_chat_agent=lg_agent"
          - name: primary_chat_agent-adk_agent
            args: "-d primary_chat_agent=adk_agent"
          - name: primary_chat_agent-none
            args: "-d primary_chat_agent=none"
          # A1 flips: .agents/ and the MCP server no longer render by default —
          # these rows keep the opt-in paths (and the agent_tools=[mcp] seed)
          # render-covered.
          - name: agent-reference-library
            args: "-d include_agent_reference_library=true"
          - name: mcp-via-agent-tools
            args: "-d agent_tools=[mcp]"
          # --- full tier: real test execution, one config per feature axis ---
          # defaults-tested is the post-A1 minimal chat_app: lg_agent only, no
          # MCP server, no rag_agent, no .agents/.
          - name: defaults-tested
            args: ""
            tier: test-py
          # The pre-A1 default config — full demo chain (both chat agents +
          # rag_agent + MCP server). Keeps the lg_agent → MCP tool →
          # rag_agent wiring tested now that defaults no longer render it.
          - name: full-chain
            args: "-d primary_chat_agent=both -d include_rag_agent=true -d include_mcp_server=true"
            tier: test-py
          # rag shape: the one project_type whose include_rag_agent default is
          # on (plus vector_backend + structure guard).
          - name: project_type-rag
            args: "-d project_type=rag"
            tier: test-py
          # A2: a non-retrieval shape — no lg_agent BM25, no rag_agent, so
          # has_corpus_pipeline is false: core/ is an empty ETL home, the corpus
          # subpackage + retrieval golden-QA eval + tests/unit/core are dropped,
          # and only the interaction-eval suite (ai_backend is agent-shaped)
          # remains. Proves the gutted-corpus render's pytest passes.
          - name: no-corpus-ai_backend
            args: "-d project_type=ai_backend"
            tier: test-py
          - name: ts-backend
            args: "-d primary_backend_language=typescript"
            tier: test-ts
          - name: split-service
            args: "-d primary_backend_language=both -d frontend_backend_topology=split_service"
            tier: test-split
          - name: ml
            args: "-d include_ml=true"
            tier: test-py
          - name: mcp-ts
            args: "-d mcp_server_language=typescript"
            tier: test-mcp-ts
          - name: vector-memory
            args: "-d vector_backend=memory"
            tier: test-py
          # defaults-tested already exercises the seeded escalation+friction
          # pair (chat_app is agent-shaped); this row covers all four
          # interaction metrics. The zero-metric removal path is covered by
          # project_type-eval_suite/mcp_server above (not agent-shaped).
          - name: eval-metrics-all
            args: "-d eval_metrics=[escalation,friction,intent,language]"
            tier: test-py
          # Domain agent_slug axis: no framework-named dirs in the render.
          # (lg_agent-without-rag_agent is now the defaults-tested config, so
          # this row only carries the slug axis.)
          - name: agent-slug
            args: "-d agent_slug=helpdesk"
            tier: test-py
          # Eval-in-CI gate (Phase 4b): an agentic+docker profile must render
          # BOTH the informational ci.yml eval-report job AND the hard cd.yml
          # build-canary gate (before docker/login). assert_gate=present drives
          # the assertion step below.
          - name: eval-gate-agentic
            args: "-d primary_chat_agent=lg_agent -d deployment_target=docker -d eval_metrics=[escalation,friction]"
            assert_gate: present
          # The mirror: a fire-and-forget shape (no eval harness, no cd.yml) must
          # render NEITHER the eval-report job NOR any gate step. Proves the
          # has_corpus_pipeline / include_interaction_evals guards keep
          # non-agentic scaffolds byte-untaxed.
          - name: eval-gate-absent
            args: "-d project_type=eval_suite -d primary_chat_agent=none"
            assert_gate: absent
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install copier
        run: pip install copier

      # No enable-cache: the template root has no uv.lock (it only exists after
      # render), so cache keying on **/uv.lock fails hard with "No file matched".
      - uses: astral-sh/setup-uv@v5

      # Renders have no package-lock.json, so npm caching (which keys on a
      # lockfile) is deliberately not enabled here.
      - uses: actions/setup-node@v5
        if: contains(matrix.tier || '', 'ts') || matrix.tier == 'test-split'
        with:
          node-version: "22"

      - name: Render (${{ matrix.name }})
        run: |
          copier copy --vcs-ref HEAD --trust --defaults \
            -d "project_name_input=Render Test" \
            ${{ matrix.args }} \
            . out/

      # .agents/ is vendored reference material that mentions copier variables in
      # prose (e.g. framework-selection's SKILL.md) — excluded here for the same
      # reason the generated Makefile's LINT_PATHS and pre-commit exclude it.
      # {{prompt}}/{{question}} are promptfoo's own runtime template syntax, not
      # unrendered copier Jinja — filtered by pattern (not by excluding the whole
      # file, which also carries real copier substitutions worth checking).
      # GitHub Actions expression syntax (github.actor, secrets.*, steps.*.outputs.*)
      # in the rendered cd.yml/ci.yml is a dollar sign followed by '{{' — same
      # rationale as promptfoo above. The pattern requires the leading '$', so a
      # line carrying real unrendered '{{ copier_var }}' still trips the check.
      # The Actions pattern is carried in ACTIONS_EXPR rather than written inline:
      # the literal sequence in a run: block would make Actions parse THIS file as
      # an unclosed expression, and escaping it through both YAML and shell quoting
      # silently collapses ('\$' is not a YAML escape, so the var stops expanding
      # and the filter matches nothing). A plain env value needs no escaping.
      - name: Check for leftover Jinja
        env:
          ACTIONS_EXPR: '[$]{{'
        run: |
          if grep -rn '{{' out/ --exclude-dir='.agents' --include='*.py' --include='*.md' --include='*.toml' --include='*.yaml' --include='*.yml' | grep -v "font-family\|border-collapse\|padding: 0.4rem\|background: #f2f2f2\|margin-bottom\|font-weight: bold\|{{prompt}}\|{{question}}\|$ACTIONS_EXPR"; then
            echo "Leftover unrendered Jinja found"
            exit 1
          fi

      # Phase 4b eval-in-CI gate — assert the conditionals don't silently rot.
      # present: agentic+docker profile renders the informational ci.yml
      # eval-report job AND the hard cd.yml build-canary gate (before docker
      # login). absent: fire-and-forget profile renders neither and has no cd.yml.
      - name: Assert eval gate rendered (${{ matrix.assert_gate }})
        if: matrix.assert_gate == 'present'
        run: |
          CI=out/.github/workflows/ci.yml
          CD=out/.github/workflows/cd.yml
          grep -q 'eval-report' "$CI" || { echo "FAIL: ci.yml missing eval-report job"; exit 1; }
          test -f "$CD" || { echo "FAIL: cd.yml did not render for agentic+docker"; exit 1; }
          grep -q -- '--gate' "$CD" || { echo "FAIL: cd.yml build-canary missing hard --gate step"; exit 1; }
          grep -q -- '--warn-empty' "$CD" || { echo "FAIL: cd.yml gate missing --warn-empty"; exit 1; }
          # The gate must run BEFORE the image build/push (docker/login).
          awk '/eval gate/{g=NR} /docker\/login-action/{d=NR} END{exit !(g>0 && g<d)}' "$CD" \
            || { echo "FAIL: eval gate is not before docker/login in cd.yml"; exit 1; }
          echo "OK: eval gate present in ci.yml (report) + cd.yml (hard, pre-build)"
      - name: Assert eval gate absent (${{ matrix.assert_gate }})
        if: matrix.assert_gate == 'absent'
        run: |
          CI=out/.github/workflows/ci.yml
          grep -q 'eval-report' "$CI" && { echo "FAIL: eval-report leaked into a fire-and-forget ci.yml"; exit 1; }
          test ! -f out/.github/workflows/cd.yml || { echo "FAIL: cd.yml rendered for a fire-and-forget profile"; exit 1; }
          echo "OK: no eval gate for the fire-and-forget profile (ci.yml untaxed, no cd.yml)"

      # Delegates to the render's own `make lint-check` (LINT_PATHS) rather than
      # repo-wide ruff — .claude/ ships vendored reference scripts (mcp-builder)
      # that are deliberately outside the project's lint boundary.
      # Lint needs only the dev group (ruff), not the full agent runtime
      # (sentence-transformers/torch, ~2GB) — sync just dev and stop `uv run`
      # from re-syncing the project. Test-tier jobs sync the full runtime later
      # via `uv run pytest`'s own auto-sync.
      - name: Lint rendered project
        working-directory: out
        run: |
          if [ -f pyproject.toml ]; then
            uv sync --only-group dev
            UV_NO_SYNC=1 make lint-check
          fi

      - name: Run Python tests
        if: matrix.tier == 'test-py' || matrix.tier == 'test-split'
        working-directory: out
        run: uv run pytest tests/unit -q

      # Re-entry idempotency: the /add-capability flow drives `copier update -d`
      # on an already-rendered repo. That exercises the _tasks staging moves a
      # SECOND time — where a plain `mv _scaffold/src ./` fails "Directory not
      # empty" (the merge-based cp -R moves in copier.yaml exist to survive this).
      # Fresh-render-only CI missed that class of bug; this step guards it. Uses
      # the working-tree re-render form (copier copy --overwrite --vcs-ref HEAD),
      # matching how these jobs render — `copier update` needs a tagged _commit.
      - name: Re-entry — add a capability onto the rendered repo
        if: matrix.tier == 'test-py'
        working-directory: out
        run: |
          git init -q && git add -A
          git -c user.email=ci@ci -c user.name=ci commit -qm "genesis render"
          copier copy --overwrite --vcs-ref HEAD --trust --defaults \
            -d include_rag_agent=true "$GITHUB_WORKSPACE" .
          test -d src/agents/rag_agent \
            || { echo "add-capability re-entry did not land rag_agent"; exit 1; }
          # rag_agent implies has_corpus_pipeline → the corpus subpackage + its
          # retrieval eval must land on re-entry too (covers the no-corpus shape
          # gaining a retrieval backend, and stays true for shapes that had it).
          test -d core/pipelines/corpus \
            || { echo "re-entry did not land core/pipelines/corpus"; exit 1; }
          test -f evals/pipelines/run.py \
            || { echo "re-entry did not land the retrieval golden-QA eval"; exit 1; }
          test ! -e _scaffold \
            || { echo "staging dir survived re-render (mv/cp task not idempotent)"; exit 1; }
          uv run pytest tests/unit -q

      # ts_project_root defaults to project_slug — "Render Test" → render-test.
      - name: TS backend — install/lint/typecheck/test/build
        if: matrix.tier == 'test-ts'
        working-directory: out/render-test
        run: |
          npm install
          npm run lint
          npm run typecheck
          npm test
          npm run build

      - name: split_service frontend — install/build
        if: matrix.tier == 'test-split'
        working-directory: out/render-test
        run: |
          npm install
          npm run build

      - name: TS MCP server — install/build
        if: matrix.tier == 'test-mcp-ts'
        working-directory: out/mcp_servers/render-test
        run: |
          npm install
          npm run build
