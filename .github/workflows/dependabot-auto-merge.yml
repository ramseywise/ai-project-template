name: Dependabot auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  # Render CI must pass before auto-merge is allowed. Branch protection is not
  # yet configured (verified 2026-07-19 — all repos returned 404 on the
  # protection API); until it is, this `needs:` is the practical gate.
  # The real fix is to add a branch protection rule requiring `render / render
  # (*)` checks — at that point this needs: becomes redundant but harmless.
  wait-for-ci:
    if: github.actor == 'dependabot[bot]'
    uses: ./.github/workflows/test-render.yml

  auto-merge:
    needs: [wait-for-ci]
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: dependabot/fetch-metadata@v3
        id: metadata
      - if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
