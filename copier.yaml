  # regardless of which language was chosen.
  - "{{ ('rm -rf ' ~ _copier_conf.dst_path ~ '/mcp_servers/' ~ mcp_server_slug ~ ' && mv ' ~ _copier_conf.dst_path ~ '/_mcp_ts_staging/' ~ mcp_server_slug ~ ' ' ~ _copier_conf.dst_path ~ '/mcp_servers/') if (include_mcp_server and mcp_server_language == 'typescript') else 'true' }}"
  - "rm -rf {{ _copier_conf.dst_path }}/_mcp_ts_staging"
