  # split_service's TS side is frontend-only (Next.js, not the Express backend
  # service), so it's excluded here — moved from its own staging dir instead,
  # by the task below.
  - "{{ ('mv ' ~ _copier_conf.dst_path ~ '/_scaffold/' ~ ts_project_root ~ ' ' ~ _copier_conf.dst_path ~ '/') if (scaffold_full_project and has_typescript and primary_backend_language in ['typescript', 'both'] and frontend_backend_topology != 'split_service') else 'true' }}"
  - "rm -rf {{ _copier_conf.dst_path }}/_scaffold"
  # split_service: swap in the Next.js frontend from its own staging dir (same
  # convention as the MCP TS-server swap below) and stage the Python auth
  # middleware alongside the chosen agent's FastAPI app.
  - >-
    {{ ('mv ' ~ _copier_conf.dst_path ~ '/_split_service_frontend_staging/' ~ ts_project_root ~ ' '
    ~ _copier_conf.dst_path ~ '/') if (scaffold_full_project and has_typescript and
    frontend_backend_topology == 'split_service') else 'true' }}
  - "rm -rf {{ _copier_conf.dst_path }}/_split_service_frontend_staging"
  # MCP server language: python (FastMCP) is copied straight to its final path
  # like always; typescript replaces it with the Node/TS staging tree (kept in
  # _mcp_ts_staging/ — a template-exclusive path, same rationale as _scaffold/ —
