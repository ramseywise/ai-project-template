_min_copier_version: "9.3.0"
_subdirectory: template
_external_data:
  # Path is RELATIVE TO dst_path (copier joins it internally — do not prefix
  # _copier_conf.dst_path here, that double-joins and the file is never found).
  # Rendered, then loaded as a Jinja namespace (`_external_data.design.<path>`)
  # before question defaults compute. Empty dict on fresh genesis (no
  # design.yaml yet) or on any repo that predates this layer — every default:
  # expression below guards with
  # `_external_data.design is defined and _external_data.design and
  # _external_data.design.stages.<stage> == 'complete'` before reading it,
  # falling back to the existing A3-derived expression otherwise. See
  # .claude/docs/plans/2026-07-18-template-full-mirror-redesign.md Q5/Q5a for
  # the full mechanism (design.yaml is a 3rd, upstream flag layer; stage-gating
  # selects which branch of a when:false flag's default wins, not whether a
  # question is asked).
  design: "design.yaml"
_message_before_copy: >+
  AI-Eng Claude Template

  The interview is deliberately short (~11–14 questions). Phase 1 scopes the
  project — what you're building, who uses it, language(s), external systems,
  deployment — and, for agent-shaped projects, what the AI system itself looks
  like (tools, memory, human approval). Phase 4 covers team conventions
  (data sensitivity, ticket prefix, notifications). That's it — the
  architecture choices that used to be Phase 2/3 (chat-agent framework, vector
  store, TS agent loop, frontend/backend topology, MCP server, optional
  integrations, eval metrics) are NOT asked at genesis: project_type derives
  the one shape example, and each of those components is a mid-project
  capability you add later with `copier update -d include_<x>=true` (the
  /add-capability path). Everything inferred — directory names, eval layout,
  Python version, AWS region, and every deferred capability — is still
  overridable non-interactively with -d (e.g. -d primary_chat_agent=both,
  -d include_mcp_server=true, -d source_root=lib).

  Picking "Layer onto an existing repo" as the project type is layering-only
  mode — safe to run into an existing repo, only adding .claude/.agents/
  mcp_servers and touching nothing else (equivalent to the old
  scaffold_full_project=false). All other project types scaffold a full
  project. The scaffold is minimal by default: one chat-agent example where
  the shape calls for it (lg_agent), and no MCP server or rag_agent unless
  the project IS one (mcp_server / rag shapes) or you ask for them — every
  component stays a `copier update -d include_<x>=true` away after genesis.

_message_after_copy: >+
  Done. Next steps:
  - Review CLAUDE.md and fill in the "Hard Rules" placeholder section.
  - Review DESIGN.md — the scoping answers you just gave are seeded there; finish the blank sections before sprint 1.
  - LIFECYCLE.md tracks phase + gates (Discovery → Delivery → Deployment) — run /gate-check once discovery artifacts exist; it's the file DSSG's project-mgmt-ai reads for status updates.
  - DEPLOYMENT.md is the Phase-3 runbook (staged rollout, rollback, monitoring) — fill it at the G2 gate; /deploy-check pre-flights launch readiness.
  - Run `chmod +x .claude/hooks/*.sh` if hooks aren't executable.
  - If scaffold_full_project: run `make setup` (uv sync + .env from example){% if primary_chat_agent in ["lg_agent", "both"] %}, then `make {{ lg_agent_dir | replace('_', '-') }}-up` to try the example agent{% elif primary_chat_agent == "adk_agent" %}, then `make {{ adk_agent_dir | replace('_', '-') }}-up` to try the example agent{% elif include_rag_agent %}, then `make rag-up` to try the example agent{% endif %}.
  {%- if scaffold_full_project and primary_backend_language in ["typescript", "both"] and frontend_backend_topology != "split_service" %}
  - TS backend service scaffolded at {{ ts_project_root }}/ — run `make ts-install` then `make ts-dev`.
  {%- endif %}
  {%- if has_typescript and ts_agent_framework == "vercel_ai_sdk" %}
  - Vercel AI SDK agent scaffolded at {{ ts_project_root }}/{{ ts_source_root }}/agent/ — set ANTHROPIC_API_KEY, then `make ts-dev` and POST to /agent/chat to try it.
  {%- endif %}
  {%- if scaffold_full_project and frontend_backend_topology == "split_service" %}
  - split_service scaffolded: Next.js frontend at {{ ts_project_root }}/ (`make ts-install` then `make ts-dev`) + FastAPI backend with Supabase-JWT auth ({{ source_root }}/middleware/auth.py). Create a Supabase project, fill in SUPABASE_URL/SUPABASE_ANON_KEY/SUPABASE_JWT_SECRET (backend) and NEXT_PUBLIC_SUPABASE_URL/NEXT_PUBLIC_SUPABASE_ANON_KEY (frontend) before first deploy — Vercel for the frontend, Railway for the backend (see railway.toml/vercel.json).
  {%- endif %}
  {%- if include_mcp_server %}
  - MCP server: `cd mcp_servers/{{ mcp_server_slug }} && {% if mcp_server_language == "typescript" %}npm install{% else %}uv sync{% endif %}`.
  {%- endif %}
  {%- if include_akira %}
  - Run the `/akira` skill (Claude Code) for a proactive quality scan once you have real code to scan.
  {%- endif %}
  {%- if include_dev_companion %}
  - `.claude/docs/companion/collaboration.md` starts blank — /grow-companion fills it in as real sessions happen.
  {%- endif %}
  {%- if scaffold_full_project %}
  - Review the seeded SANYI.md (change contract) — Jianyi/Bianyi entries are pre-filled from your answers; complete the 不易 Buyi interview with `/sanyi init` before the first review run.
  {%- else %}
  - Run `/sanyi init` to define this project's change-contract (变易/简易/不易 layers) now that its shape is set.
  {%- endif %}

_exclude:
  - __pycache__
  - .git
  - copier.yaml

# ─── Phase 1 — Project scoping ────────────────────────────────────────────
# These questions determine the scaffold. Later phases either derive their
# defaults from these answers or are only asked when relevant. Hidden
# (when: false) questions are still computed and still overridable with -d —
# that's how CI and /project-genesis drive them non-interactively.

project_name:
  type: str
  help: What is your project name?
  placeholder: "{{project_name_input}}"
  default: "{{project_name_input}}"

project_slug:
  type: str
  help: Is this project slug ok? (used for folder/package naming)
  placeholder: my-project
  default: "{{ project_name.lower().replace(' ', '-') }}"

project_description:
  type: str
  help: One-sentence description of the project
  default: "TODO: describe this project"

project_type:
  type: str
  help: >-
    What are you building? This drives which questions follow and what gets
    scaffolded — implementation details (vector store, eval harness, MCP
    language, ...) are inferred from it and only surfaced when they matter.
  choices:
    "AI chat application": chat_app
    "Autonomous agent": agent
    "Workflow automation": workflow
    "RAG / document Q&A": rag
    "MCP server": mcp_server
    "AI backend / API service": ai_backend
    "Evaluation suite": eval_suite
    "Research prototype": prototype
    "Layer onto an existing repo (tooling only)": existing_repo
  default: chat_app

# Derived: the old top-level toggle, now inferred from project_type.
# existing_repo = layering-only mode — safe to run into an existing repo, only
# adds .claude/.agents/mcp_servers. Overridable with -d scaffold_full_project=…
# (how CI's layering-only job drives it without picking a project_type).
scaffold_full_project:
  type: bool
  default: "{{ project_type != 'existing_repo' }}"
  when: false

# The one canonical "is this an agent-shaped project?" predicate — referenced by
# agent_tools/agent_memory/human_approval's when: and DESIGN.md.jinja's Key
# Decisions block, which must all stay in lockstep. Edit the list here only.
is_agent_shaped:
  type: bool
  default: "{{ scaffold_full_project and project_type in ['chat_app', 'agent', 'workflow', 'rag', 'ai_backend'] }}"
  when: false

primary_users:
  type: str
  help: >-
    Who uses it? Seeds the data-sensitivity default (customer- or
    public-facing implies restricted) and DESIGN.md's actor table.
  choices:
    "Internal team": internal
    "Customers": customers
    "Developers": developers
    "Public API": public_api
  default: internal

primary_backend_language:
  type: str
  help: >-
    Implementation language(s). python ships the working example agents.
    typescript/both additionally scaffold a real Node/TS backend service (not
    just frontend hooks) with its own lint/typecheck/test tooling.
  choices:
    python: "python"
    typescript: "typescript"
    both: "both"
  default: >-
    {{ (('both' if (_external_data.design.backends.python.enabled and
    _external_data.design.backends.typescript.enabled) else
    ('typescript' if _external_data.design.backends.typescript.enabled else 'python')))
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else 'python' }}
  # Q5 row 4 (stage-gated on discovery): seed reflects which backends are
  # enabled in design.yaml once discovery is complete — the question stays
  # askable/​overridable either way (this only changes its seed, same as
  # every other Layer-A default). Else = the original literal 'python' default.

# Derived from primary_backend_language. Override with -d has_typescript=true
# for a frontend-only TS project layered onto an existing repo (adds the TS
# quality/typecheck hooks without scaffolding a backend).
has_typescript:
  type: bool
  # Gated on scaffold_full_project: a layering-only render must not ship the
  # ts_*.sh hooks, which assume a scaffolded TS project (package.json/tsconfig
  # at ts_project_root) that layering mode never creates. A frontend-only
  # layered TS repo can still opt in with -d has_typescript=true.
  default: "{{ primary_backend_language in ['typescript', 'both'] if scaffold_full_project else false }}"
  when: false

external_systems:
  type: str
  multiselect: true
  help: >-
    Which external systems will this project interact with? Seeds later
    defaults (Calendar → Google Calendar client, Web → web research,
    Slack/GitHub/Email/Workspace → Composio, Database → pgvector) — every
    seeded choice resurfaces for confirmation later, nothing is silently
    locked in.
  choices:
    "Slack": slack
    "GitHub": github
    "Google Workspace": google_workspace
    "Calendar": calendar
    "Email": email
    "Database": database
    "Web": web
  default: []

deployment_target:
  type: str
  help: >-
    Expected deployment. Recorded in DESIGN.md's key decisions; the infra/
    skeleton (Terraform, Dockerfiles) ships with every full scaffold either
    way. docker/cloud additionally scaffold .github/workflows/cd.yml
    (build-and-push to GHCR) when the lg_agent image exists to build —
    local/serverless get no CD workflow (serverless deploys via the
    platform's own git integration).
  choices:
    "Local only": local
    "Docker": docker
    "Cloud (long-running service)": cloud
    "Serverless (Vercel / Lambda)": serverless
  default: >-
    {{ _external_data.design.deployment_target
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else 'local' }}
  # Q5 row 9 (stage-gated on discovery): direct copy of design.deployment_target
  # once discovery is complete; else the original literal 'local' default. Stays
  # askable — this only changes the seed shown/used, same as primary_backend_language.

# Q5 row 8 (new flag): which cloud, drives the RAG-per-cloud matrix (Q4:
# bedrock_kb needs aws, vertex_rag needs gcp) and terraform provider selection
# (providers.aws.tf / providers.gcp.tf, gated on this flag — see Q4 execution
# note). Stage-gated on discovery; else 'none' (no legacy expression — cloud
# selection is new in this redesign, deployment_target alone didn't carry it).
cloud:
  type: str
  choices:
    none: "none"
    aws: "aws"
    gcp: "gcp"
  default: >-
    {{ _external_data.design.cloud
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else 'none' }}
  when: false

# ─── Phase 1b — the AI system itself ──────────────────────────────────────
# Only asked for agent-shaped projects. These shape DESIGN.md's key-decisions
# table and seed architecture defaults (MCP server, postgres checkpointer) —
# they matter more than any individual tool toggle.

agent_tools:
  type: str
  multiselect: true
  help: >-
    Will the agent use tools? Recorded in DESIGN.md; selecting "MCP" (a
    declared MCP host consumer) seeds the MCP-server default. Nothing is
    pre-selected beyond what your external-systems answer implies — REST is
    the standard service boundary, MCP an adapter over it.
  choices:
    "Web search": search
    "Filesystem": filesystem
    "GitHub": github
    "Database": database
    "MCP (expose/consume tools)": mcp
    "Custom (project-specific)": custom
  default: "{{ (['github'] if 'github' in external_systems else []) + (['database'] if 'database' in external_systems else []) }}"
  when: "{{ is_agent_shaped }}"

agent_memory:
  type: str
  help: >-
    Will the agent store memory? conversation = per-thread history (LangGraph
    checkpointer, the scaffold's default). long_term = durable cross-session
    memory — seeds the postgres checkpointer dependency so persistence has
    somewhere real to live. Recorded in DESIGN.md.
  choices:
    "No memory (stateless calls)": none
    "Conversation history": conversation
    "Long-term / cross-session": long_term
  default: conversation
  when: "{{ is_agent_shaped }}"

human_approval:
  type: str
  help: >-
    Does the agent need human approval before acting? Recorded in DESIGN.md's
    key decisions — it constrains every tool that writes to an external
    system, so decide it now, not after the first irreversible write.
  choices:
    "No — fully autonomous": none
    "Sometimes — for irreversible/external writes": sometimes
    "Always — human confirms every action": always
  default: sometimes
  when: "{{ is_agent_shaped }}"

# Inferred directory layout — computed here (before Phase 2) because later
# question help-strings interpolate it; copier renders each question with only
# the answers collected so far. Never asked; override with -d source_root=….
# Re-parented under backend/ (step 2b′): the Python backend tree is
# backend/src/, while the staging layout under _scaffold/ stays flat — the
# destination merge (below) creates the nested path via mkdir -p.
source_root:
  type: str
  default: backend/src
  when: false

# ─── Phase 2 — Architecture (A3: derived from Phase 1, -d-only, never asked) ─
# These were interview questions; A3 (F4) made them `when: false` — the shape
# example is derived from project_type and each component is a deferred
# capability added post-genesis via `copier update -d <name>=…`
# (the /add-capability path). Defaults + validators still apply; drive them
# non-interactively with -d.

primary_chat_agent:
  type: str
  help: >-
    Which prebuilt chat-agent implementation(s) do you want? This picks the
    framework(s) of the user-facing chat agent — the agent itself is named by
    the next question (agent_slug), not after the framework. A new project
    needs one working example (lg_agent by default); the other framework is a
    `copier update -d primary_chat_agent=…` away. akira (quality scanning) is
    a .claude skill + agent, not product source. "none" means no prebuilt
    chat agent — build your own.
  choices:
    lg_agent: "lg_agent"
    adk_agent: "adk_agent"
    both: "both"
    none: "none"
  default: >-
    {{ ('lg_agent' if _external_data.design.backends.python.framework == 'langgraph' else
    ('adk_agent' if _external_data.design.backends.python.framework == 'adk' else 'none'))
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete' and
    _external_data.design.backends.python.enabled) else
    ('lg_agent' if project_type in ['chat_app', 'agent', 'workflow', 'prototype'] else 'none') }}
  # A3: no longer asked at genesis — project_type picks the one shape example
  # (chat shapes → lg_agent; everything else → none). A second framework is a
  # tier-3 capability added later via `copier update -d primary_chat_agent=…`
  # (the /add-capability path). Still computed + overridable with -d.
  # Q5 row 1 (design.yaml layer, stage-gated on discovery): once
  # design.stages.discovery == 'complete', backends.python.framework wins
  # (langgraph -> lg_agent, adk -> adk_agent, python disabled -> none); else
  # the A3-derived project_type expression above is the fallback. Flag stays
  # when: false — stage-gating picks the default: branch, not askability.
  when: false

agent_slug:
  type: str
  help: >-
    Directory/package name for your chat agent under
    {{ source_root }}/agents/ — name it for what the agent DOES
    (intake_triage, helpdesk, grants_qa), not the framework it's built on.
    Makefile targets follow it (<slug>-up/-down/-chat). With
    primary_chat_agent=both, the LangGraph implementation gets this name and
    the ADK one gets <slug>_adk.
  placeholder: assistant
  default: assistant
  validator: >-
    {% if not (agent_slug | regex_search('^[a-z][a-z0-9_]*$')) %}agent_slug
    must be a lowercase Python identifier (letters/digits/underscores, letter
    first){% endif %}{% if agent_slug in ['rag_agent', 'lg_agent', 'adk_agent',
    'akira', 'agents', 'core', 'tests'] %} agent_slug '{{ agent_slug }}' is
    reserved{% endif %}
  # A3: no longer asked at genesis — the single chat example is named `assistant`
  # by default; rename it with -d agent_slug=<name> (validator still enforced).
  when: false

# Derived directory names the templates and _tasks actually consume. When a
# framework isn't the chosen one its tree keeps the framework name in staging
# (it's removed by _tasks before the big mv, so the name never reaches the
# rendered project). agent_slug values colliding with these staging names are
# rejected by the validator above.
lg_agent_dir:
  type: str
  default: "{{ agent_slug if primary_chat_agent in ['lg_agent', 'both'] else 'lg_agent' }}"
  when: false

adk_agent_dir:
  type: str
  default: "{{ (agent_slug ~ '_adk') if primary_chat_agent == 'both' else (agent_slug if primary_chat_agent == 'adk_agent' else 'adk_agent') }}"
  when: false

include_rag_agent:
  type: bool
  help: >-
    Ship the prebuilt rag_agent retrieval backend (LangGraph + vector store)?
    Default on only for the rag project shape — it's that shape's working
    end-to-end example, not shared infrastructure. Other shapes opt in here
    (or later via `copier update -d include_rag_agent=true`). The MCP
    retrieval tool, when scaffolded, calls RAG_AGENT_URL either way — point
    it at any compatible /api/v1/retrieval endpoint.
  default: >-
    {{ ('rag' in _external_data.design.backends.python.capabilities)
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else
    (project_type == 'rag') }}
  # A3: no longer asked at genesis — on for the rag shape (its example), off
  # elsewhere. A tier-3 capability otherwise: add later with
  # `copier update -d include_rag_agent=true` (/add-rag).
  # Q5 row 3 (stage-gated on discovery): 'rag' in
  # design.backends.python.capabilities wins once discovery is complete; else
  # the A3-derived project_type == 'rag' expression is the fallback.
  when: false

# Derived: does this render ship the corpus data pipeline
# (core/pipelines/corpus/ — markdown → JSONL → DuckDB FTS index) and the
# retrieval golden-QA eval that grades against it? True whenever a retrieval
# example agent is present: the LangGraph chat agent (BM25 over the FTS index,
# core.pipelines.corpus.index.search) or rag_agent (embedding retrieval over
# the same preprocessed corpus). core/ itself is the general ETL home and
# always ships in a full scaffold; only the corpus SUBpackage + its golden-QA
# eval, tests, fixtures, and Makefile targets are gated here — a non-retrieval
# shape (mcp_server / eval_suite / ai_backend / adk-only / none) gets an empty
# core/ ETL layer with no corpus pipeline welded in. Override with
# -d has_corpus_pipeline=… (independent of scaffold_full_project — false in
# layering mode, which ships no src pipeline at all).
has_corpus_pipeline:
  type: bool
  default: >-
    {{ (scaffold_full_project and 'rag' in _external_data.design.backends.python.capabilities
    and _external_data.design.rag.corpus_pipeline == 'markdown_jsonl')
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else
    (scaffold_full_project and (primary_chat_agent in ['lg_agent', 'both'] or include_rag_agent)) }}
  # Q5 row 3 (has_corpus_pipeline keeps its `or lg_agent` clause in the A3-derived
  # else branch). design.yaml branch additionally requires
  # rag.corpus_pipeline == 'markdown_jsonl' (Q4): only that rag_impl ships the
  # markdown->JSONL->DuckDB pipeline; bedrock_kb/vertex_rag/ts_vectorstore don't.
  when: false

vector_backend:
  type: str
  help: >-
    rag_agent's vector store backend. duckdb is a durable single file, no
    external service. memory is in-process (zero setup, optional JSON snapshot
    for persistence across restarts) — good for local dev/CI. opensearch is
    for production scale (external cluster, HNSW kNN) — requires the optional
    opensearch-py dependency and a reachable cluster. postgres uses pgvector —
    for Supabase or any managed Postgres, requires the optional
    psycopg/pgvector dependencies and a reachable database with the pgvector
    extension enabled.
  choices:
    duckdb: "duckdb"
    memory: "memory"
    opensearch: "opensearch"
    postgres: "postgres"
  default: >-
    {{ _external_data.design.rag.vector_store
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else
    ('postgres' if 'database' in external_systems else 'duckdb') }}
  # A3 (F4): a vector-backend upgrade is a mid-project capability, not a
  # genesis decision — default duckdb (or postgres when a database was named),
  # change later with -d vector_backend=… (/add-capability vector-backend).
  # Q5 row 7 (stage-gated on discovery): direct copy of design.rag.vector_store;
  # else the A3-derived external_systems-based expression.
  when: false

# Q5 row 7 (new flag): which RAG implementation the vectorstore factory
# selects — langgraph_vectorstore (current, vector_backend-driven),
# bedrock_kb (ADK+AWS managed KB), vertex_rag (ADK+GCP managed RAG Engine),
# ts_vectorstore (TS backend mirror). See the RAG-per-cloud matrix (plan Q4).
# Stage-gated on discovery; else langgraph_vectorstore (today's only impl).
rag_impl:
  type: str
  choices:
    langgraph_vectorstore: "langgraph_vectorstore"
    bedrock_kb: "bedrock_kb"
    vertex_rag: "vertex_rag"
    ts_vectorstore: "ts_vectorstore"
  default: >-
    {{ _external_data.design.rag.backend
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else 'langgraph_vectorstore' }}
  when: false

# Q5 row 7 (new flag): which corpus ingestion tree ships. Only markdown_jsonl
# ships the core/pipelines/corpus/ DuckDB FTS pipeline (has_corpus_pipeline);
# bedrock_ingest/vertex_datastore/ts_ingest ship managed-ingestion config
# instead (plan Q4 table). Stage-gated on discovery; else markdown_jsonl.
corpus_pipeline_kind:
  type: str
  choices:
    markdown_jsonl: "markdown_jsonl"
    bedrock_ingest: "bedrock_ingest"
    vertex_datastore: "vertex_datastore"
    ts_ingest: "ts_ingest"
  default: >-
    {{ _external_data.design.rag.corpus_pipeline
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else 'markdown_jsonl' }}
  when: false

# Q5 row 5 (new flag): backend-ts RAG mirror (Q4 tree D, ts_vectorstore).
# Gates backend-ts/src/rag/ cleanup. Stage-gated on discovery; else false (no
# legacy expression — the TS RAG mirror is new in this redesign).
include_ts_rag:
  type: bool
  default: >-
    {{ ('rag' in _external_data.design.backends.typescript.capabilities)
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else false }}
  when: false

# Derived: adds langgraph-checkpoint-postgres so the LangGraph checkpointer
# CAN be switched to postgres at runtime (LG_CHECKPOINTER=postgres /
# RAG_CHECKPOINTER=postgres, using POSTGRES_DSN). The runtime default stays
# "memory" either way — checkpointer construction happens eagerly at
# graph-compile time (unlike vector_backend, which is lazy per-call), so
# defaulting straight to postgres would make `make test`/import fail hard
# without a live database reachable. Seeded on when vectors already live in
# postgres or the agent declared long-term memory; independent of
# vector_backend otherwise (override with -d enable_postgres_checkpointer=…).
enable_postgres_checkpointer:
  type: bool
  default: "{{ vector_backend == 'postgres' or agent_memory == 'long_term' }}"
  when: false

# Derived TS layout — 99% of projects answer src / <project_slug>; override
# with -d ts_source_root=… / -d ts_project_root=… if yours differs.
ts_source_root:
  type: str
  default: src
  when: false

ts_project_root:
  type: str
  default: "{{ project_slug }}"
  when: false

# Where the TS backend service LANDS (step 2b′) — distinct from ts_project_root,
# which is its staging dir under _scaffold/ and is unchanged. A typescript-only
# backend renders to backend/, matching the Python layout. Under `both`, Python
# already owns backend/, so TS keeps its project-named root rather than colliding
# — the uniformity rule's one explicit exception.
ts_backend_dest:
  type: str
  default: "{{ ts_project_root if primary_backend_language == 'both' else 'backend' }}"
  when: false

# Orthogonal to primary_chat_agent — a TS project may or may not want an agent
# loop at all (some TS backends are plain API services). vercel_ai_sdk stages
# a real agent/ tree (streamText + tool() loop, Anthropic provider) at
# {{ ts_project_root }}/{{ ts_source_root }}/agent/, framework-agnostic (a
# plain Request->Response handler, wireable into Express today or a Next.js
# route handler in a Vercel-hosted project) — see
# .agents/skills/framework-selection.
ts_agent_framework:
  type: str
  help: >-
    TypeScript agent framework. none stages the plain TS backend service only,
    no LLM code. vercel_ai_sdk additionally stages a real tool-calling agent
    loop (Vercel AI SDK's streamText + tool()) — for projects deploying a
    TS-native assistant (e.g. a Vercel-hosted frontend's own API routes)
    rather than calling out to a separate Python agent service.
  choices:
    none: "none"
    vercel_ai_sdk: "vercel_ai_sdk"
  default: >-
    {{ (_external_data.design.backends.typescript.framework
    if _external_data.design.backends.typescript.enabled else 'none')
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else
    ('vercel_ai_sdk' if primary_backend_language == 'typescript' and project_type in ['chat_app', 'agent'] else 'none') }}
  # A3 (F4): topology/second-framework decision — derived from language + shape,
  # override with -d ts_agent_framework=vercel_ai_sdk (added later as a capability).
  # Q5 row 4 (stage-gated on discovery): design.backends.typescript.framework
  # wins once discovery is complete (only 'none'|'vercel_ai_sdk' choices exist
  # today so this is a direct passthrough); else the A3-derived expression.
  when: false

# Orthogonal to ts_agent_framework — that toggle is about whether the *agent
# loop* lives in TS (single-service, no separate Python backend needed).
# frontend_backend_topology is about *deployment shape*: does the TS side
# deploy as one thing, or as a genuinely separate service from the Python
# backend, each with its own host and its own auth boundary? split_service
# scaffolds FOIA-Fluent's actual production shape (dssg/projects/FOIA-Fluent)
# — a Next.js frontend + a separate FastAPI backend, sharing identity via
# Supabase Auth JWT rather than sharing a process. Mutually exclusive in
# practice with ts_agent_framework=vercel_ai_sdk (that path assumes the
# agent's own API routes ARE the backend); /project-genesis should flag the
# conflict rather than copier enforcing it structurally.
frontend_backend_topology:
  type: str
  help: >-
    How do frontend and backend deploy? single (default) is one deployable —
    frontend hooks only, or one Node/TS backend service per
    primary_backend_language. split_service scaffolds FOIA-Fluent's proven
    shape: a Next.js frontend (Vercel) + a separate FastAPI backend (Railway),
    talking over HTTPS, sharing identity via Supabase Auth JWT — an Edge
    middleware on the frontend and a FastAPI dependency on the backend
    ({{ source_root }}/middleware/auth.py) — with Postgres RLS for tenant
    isolation. Only offered when there's both a real TS component and a
    Python backend to connect.
  choices:
    single: "single"
    split_service: "split_service"
  default: >-
    {{ ('split_service' if (_external_data.design.web.enabled and
    _external_data.design.backends.python.enabled) else 'single')
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else 'single' }}
  # A3 (F4): split_service is a tier-3 deployment-shape capability, landed when
  # a real frontend ships — not a genesis question. Default single; opt in with
  # -d frontend_backend_topology=split_service (/add-capability split_service).
  # Q5 row 6 (stage-gated on discovery): split_service when both web.enabled
  # and backends.python.enabled are true in design.yaml; else 'single'.
  when: false

# Q5 row 6 (new flag): whether a frontend/ tree renders at all. Independent of
# frontend_backend_topology (which governs deploy SHAPE once a frontend
# exists) — this governs whether one exists. Stage-gated on discovery; else
# false (A3 has no frontend concept pre-design.yaml — frontend is entirely new
# in this redesign, so there is no legacy expression to fall back to).
include_frontend:
  type: bool
  help: >-
    Scaffold a frontend/ tree (Next.js)? Derived from design.yaml's web.enabled
    once discovery is complete; off otherwise — this template has no frontend
    scaffold prior to the full-mirror redesign.
  default: >-
    {{ _external_data.design.web.enabled
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else false }}
  when: false

# Independent of scaffold_full_project — available in layering-only mode too.
include_mcp_server:
  type: bool
  help: >-
    Scaffold a parameterized MCP server for this project? Defaults on only
    when the project IS an MCP server, or when you explicitly listed MCP in
    agent_tools (a declared MCP host consumer). MCP servers here are thin
    adapters over the REST boundary, never the primary surface.
  # A3/§3c: no longer asked at genesis — on only when the project IS an MCP
  # server or you listed MCP in agent_tools (a declared host consumer). Add an
  # MCP adapter later with -d include_mcp_server=true (/add-capability mcp).
  default: "{{ project_type == 'mcp_server' or 'mcp' in agent_tools }}"
  when: false

mcp_server_name:
  type: str
  default: "{{ project_slug }}"
  when: false

mcp_server_slug:
  type: str
  default: "{{ project_slug }}"
  when: false

mcp_server_language:
  type: str
  help: >-
    MCP server implementation language. python (FastMCP) or typescript (the
    official MCP TypeScript SDK — see
    .claude/skills/mcp-builder/reference/node_mcp_server.md). Independent of
    primary_backend_language — a Python backend can have a TS MCP server or
    vice versa; the default just follows your language answer.
  choices:
    python: "python"
    typescript: "typescript"
  default: "{{ 'typescript' if primary_backend_language == 'typescript' else 'python' }}"
  # A3: derived from primary_backend_language now that include_mcp_server is
  # -d-only; override with -d mcp_server_language=typescript.
  #
  # Layout note: the two languages are disjoint file trees, not one tree with a
  # Jinja switch, so they can't collapse into a single {{ mcp_server_slug }} dir.
  # python (FastMCP) lives at template/mcp_servers/{{ mcp_server_slug }} and is
  # copied straight to its final path; typescript lives at the underscore-prefixed
  # staging twin template/_mcp_ts/{{ mcp_server_slug }} and is swapped in by the
  # _tasks step near the `_mcp_ts` mv (see comment at that task). {{ }} here only
  # names the dir — the language *choice* is made in _tasks, the one layer that
  # can delete/move whole trees.
  when: false

# ─── Phase 3 — Optional features (A3: derived, -d-only, never asked) ──────
# Was a genesis multiselect; A3 (F4) made optional_features + eval_metrics
# `when: false`. The shape-derived default is applied silently at genesis; add
# integrations/metrics later with -d (/add-integration, /add-eval-metric).

optional_features:
  type: str
  multiselect: true
  help: >-
    Optional add-ons. Defaults are seeded from your Phase-1 answers — akira
    and the dev companion are on by default; integrations implied by your
    external-systems answer are pre-selected; everything else is off.
    (Calendar isn't listed here — selecting Calendar in external systems
    already scaffolds the Google Calendar client.)
  choices:
    "akira — proactive quality scans (.claude skill + vendored akira-scan agent)": akira
    "dev companion — living how-we-work doc + /dream maintenance audits": dev_companion
    "promptfoo — config-driven HTTP eval harness alongside the Python evals": promptfoo
    "ragas — LLM-judge eval grader (KNOWN ISSUE: ragas 0.4.3 import bug upstream, degrades gracefully, no real scores until fixed)": ragas
    "web research — GPT-Researcher reports (KNOWN ISSUE: needs Python <=3.13, own API keys)": web_research
    "meeting intelligence — transcript -> action items/decisions via one LLM call": meeting_intelligence
    "marketing clients — Eventbrite/LinkedIn/Canva httpx clients": marketing
    "n8n webhook — HMAC-verified inbound receiver (POST /webhooks/n8n)": n8n_webhook
    "composio — third-party app actions (Gmail/Slack/GitHub, hundreds more)": composio
    "ml — classical ML/stats toolkit (regression, time-series, A/B, clustering)": ml
  default: "['akira', 'dev_companion'{% if 'web' in external_systems %}, 'web_research'{% endif %}{% if 'slack' in external_systems or 'github' in external_systems or 'email' in external_systems or 'google_workspace' in external_systems %}, 'composio'{% endif %}{% if project_type == 'workflow' %}, 'n8n_webhook'{% endif %}{% if project_type == 'eval_suite' %}, 'promptfoo'{% endif %}]"
  # A3 (F4): optional integrations are mid-project capabilities, not a genesis
  # menu — the shape-derived default (akira + dev_companion, plus integrations
  # implied by external_systems/shape) is applied silently; add more later with
  # -d optional_features=[…] or the /add-integration path. Still overridable.
  when: false

# Does this project produce model interactions worth grading? The interaction
# evals (escalation/friction/intent/language) grade a *conversational turn* —
# they need a chat agent to have produced one. `is_agent_shaped` is the wrong
# gate for that: it keys off project_type, which is the project's SHAPE, not
# whether a chat agent was actually scaffolded. The two diverge in both
# directions, and step 7 exists because both divergences shipped:
#   - primary_chat_agent=none on an agent-shaped type (chat_app etc.) rendered
#     escalation+friction graders, a metrics_registry importing them, and
#     targets.yaml keys — all grading an agent the project does not contain.
#   - an ml-shaped project (project_type=prototype + ml) is not agent-shaped,
#     so it correctly got none; that half was already right and must stay right.
# Keyed on primary_chat_agent for the same reason has_corpus_pipeline is: the
# concrete capability, not the shape label. `both` counts (two agents, still
# gradeable turns); `none` does not.
#
# adk_agent counts even though the shipped judges were written against the
# LangGraph example — the graders read EvalInteraction (framework-agnostic
# recorded turns), not a framework object, so an ADK project grades its own
# interactions through the same registry.
has_gradeable_interactions:
  type: bool
  default: >-
    {{ (scaffold_full_project and _external_data.design.backends.python.enabled
    and _external_data.design.backends.python.framework in ['langgraph', 'adk'])
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else
    (scaffold_full_project and is_agent_shaped
    and primary_chat_agent in ['lg_agent', 'adk_agent', 'both']) }}
  # Mirrors has_corpus_pipeline's two-branch shape (Q5): design.yaml once
  # discovery is complete, else the A3-derived answer expression. `and
  # is_agent_shaped` is kept in the else branch so a NON-agent shape that
  # nonetheless carries a chat-agent answer (primary_chat_agent defaults to
  # lg_agent for `prototype`, which is not agent-shaped) does not acquire
  # interaction evals — that half of the coupling was already correct.
  when: false

eval_metrics:
  type: str
  multiselect: true
  help: >-
    Interaction-eval metrics to scaffold in {{ eval_root }}/ — each ships a
    matched heuristic grader + LLM judge + aggregation + report section, wired
    through graders/metrics_registry.py, with sampling/redaction/calibration
    pipelines alongside. Retrieval isn't listed: its golden-QA eval ships with
    every full scaffold regardless. Projects with a prebuilt chat agent
    pre-select escalation + friction.
  choices:
    "escalation — did the assistant hand off to a human when it should?": escalation
    "friction — hedging/vagueness/UX friction in responses": friction
    "intent — routing/intent classification correctness": intent
    "language — response language matches the user's": language
  default: "[{% if has_gradeable_interactions %}'escalation', 'friction'{% endif %}]"
  # A3 (F4): interaction-eval metrics are added as they become relevant, not at
  # genesis — projects with a chat agent seed escalation + friction; add others
  # later with -d eval_metrics=[…] (/add-eval-metric). Still overridable.
  # Step 7: the seed gate moved from is_agent_shaped to
  # has_gradeable_interactions — see that variable's comment.
  when: false

# Derived feature toggles — the _tasks block and templates consume these
# names; the multiselect above (plus external_systems for calendar) is the
# single user-facing surface. Each remains overridable with -d, which is how
# CI exercises individual axes (e.g. -d include_ml=true).

# Both gated on scaffold_full_project: optional_features is skipped in
# layering-only mode but still computes its full default list, which would
# otherwise flip these on in an existing repo that never asked for them.
include_akira:
  type: bool
  default: "{{ scaffold_full_project and 'akira' in optional_features }}"
  when: false

include_dev_companion:
  type: bool
  default: "{{ scaffold_full_project and 'dev_companion' in optional_features }}"
  when: false

include_promptfoo:
  type: bool
  default: "{{ 'promptfoo' in optional_features }}"
  when: false

include_ragas_grader:
  type: bool
  default: "{{ 'ragas' in optional_features }}"
  when: false

include_web_research:
  type: bool
  default: "{{ 'web_research' in optional_features }}"
  when: false

include_meeting_intelligence:
  type: bool
  default: "{{ 'meeting_intelligence' in optional_features }}"
  when: false

include_marketing_integrations:
  type: bool
  default: "{{ 'marketing' in optional_features }}"
  when: false

include_n8n_webhook:
  type: bool
  default: "{{ 'n8n_webhook' in optional_features }}"
  when: false

include_composio:
  type: bool
  default: "{{ 'composio' in optional_features }}"
  when: false

include_ml:
  type: bool
  default: >-
    {{ ('ml' in _external_data.design.backends.python.capabilities)
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else
    ('ml' in optional_features) }}
  # Q5 row 2: repoints include_ml's OWN default directly, bypassing the
  # optional_features multiselect (design.yaml never reconstructs that list).
  # Stage-gated on discovery; else = existing A3-derived 'ml' in
  # optional_features expression, kept verbatim.
  when: false

# LLM tracing provider for backend/src/observability/ (step 3′). Agentic-only:
# an ml-only project has no LLM calls to trace, so the subtree is removed in
# _tasks when is_agent_shaped is false and this collapses to 'none'.
# The factory file MUST stay named observability.py — .claude/hooks/sdk_lint.sh
# (B3) exempts only that filename from the bare-client-instantiation check, so
# renaming it makes the scaffold flag itself.
observability_provider:
  type: str
  choices:
    langfuse: langfuse
    langsmith: langsmith
    none: none
  default: "{{ 'langfuse' if is_agent_shaped else 'none' }}"
  # A3 invariant: derived, never asked — drive it with
  # -d observability_provider=langsmith.
  when: false

# Guard layers for backend/src/security/ (step 4′). Agentic-only: the three
# layers wrap an LLM turn (untrusted input → prompt → model output), so an
# ml-only project has nothing to guard and the subtree is removed in _tasks.
# Independent of observability_provider — guards don't trace. The output filter
# runs BEFORE observability/tracing.py's redact() so a value the model leaked
# never reaches the tracing backend (CLAUDE.md.jinja, DESIGN.md.jinja).
include_security_guards:
  type: bool
  default: "{{ is_agent_shaped }}"
  # A3 invariant: derived, never asked — drive it with
  # -d include_security_guards=false.
  when: false

include_calendar_integration:
  type: bool
  default: "{{ 'calendar' in external_systems }}"
  when: false

# Derived per-metric toggles from the eval_metrics multiselect — same pattern
# as the optional_features derivations above.
#
# Gated on has_gradeable_interactions (step 7), which is strictly stronger than
# the scaffold_full_project conjunct these carried before: it still keeps
# layering-only mode from computing a truthy default off the (skipped)
# multiselect's seeded default, AND it makes the gate hold against an EXPLICIT
# override. That second half is the point — `-d eval_metrics=[intent]` on a
# primary_chat_agent=none project would otherwise scaffold an intent grader,
# a registry importing it, and a targets.yaml key, all grading an agent that
# was never rendered. The metric list stays user-selectable; whether ANY
# interaction metric is coherent for the project is not a list question.
include_metric_escalation:
  type: bool
  default: >-
    {{ (has_gradeable_interactions and 'escalation' in _external_data.design.evals.interaction)
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else
    (has_gradeable_interactions and 'escalation' in eval_metrics) }}
  # Q5 row 10: repoints include_metric_escalation's OWN default directly,
  # bypassing the eval_metrics multiselect. Stage-gated on discovery; else the
  # existing A3-derived 'escalation' in eval_metrics expression, kept verbatim.
  when: false

include_metric_friction:
  type: bool
  default: >-
    {{ (has_gradeable_interactions and 'friction' in _external_data.design.evals.interaction)
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else
    (has_gradeable_interactions and 'friction' in eval_metrics) }}
  when: false

include_metric_intent:
  type: bool
  default: >-
    {{ (has_gradeable_interactions and 'intent' in _external_data.design.evals.interaction)
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else
    (has_gradeable_interactions and 'intent' in eval_metrics) }}
  when: false

include_metric_language:
  type: bool
  default: >-
    {{ (has_gradeable_interactions and 'language' in _external_data.design.evals.interaction)
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else
    (has_gradeable_interactions and 'language' in eval_metrics) }}
  when: false

# Any interaction metric selected → ship the shared machinery (models,
# registry, judges base, grade/sampling/calibration/redaction pipelines,
# report builder/renderer, sample data, tests).
include_interaction_evals:
  type: bool
  default: "{{ include_metric_escalation or include_metric_friction or include_metric_intent or include_metric_language }}"
  when: false

# ─── Phase 4 — Team conventions ───────────────────────────────────────────

data_sensitivity:
  type: str
  help: >-
    What's the most sensitive data this project will touch? Drives a CLAUDE.md
    hard-rule and (when scaffold_full_project) a Terraform resource tag —
    governance should be visible from day one, not bolted on later. Default
    follows your primary-users answer (customer/public-facing -> restricted).
  choices:
    public: "public"
    internal: "internal"
    restricted: "restricted"
    secret: "secret"
  default: >-
    {{ _external_data.design.data_sensitivity
    if (_external_data.design is defined and _external_data.design and
    _external_data.design.stages is defined and
    _external_data.design.stages.discovery == 'complete') else
    ('restricted' if primary_users in ['customers', 'public_api'] else 'internal') }}
  # Q5 (— row, data_sensitivity): direct copy of design.data_sensitivity once
  # discovery is complete (governance decision seeded during Discovery per the
  # design.yaml schema); else the original literal primary_users-derived
  # expression. Stays askable.

ticket_prefix:
  type: str
  help: Ticket prefix used for branch naming and linked-issue conventions (e.g. LIN, JIRA, GH)
  default: LIN

enable_macos_notifications:
  type: bool
  help: Use macOS notifications (osascript) for Stop/long-test hooks? (turn off on Linux/CI)
  default: true

# ─── Inferred repo configuration (never asked — override with -d) ─────────
# (source_root lives above Phase 2 — later help-strings interpolate it.)

eval_root:
  type: str
  default: evals
  when: false

eval_allowed_dirs:
  type: str
  default: graders metrics pipelines reports utils
  when: false

# Canonical eval-suite directory-layout enforcement — only meaningful for
# eval-suite-shaped repos (eval suites, RAG projects graded against golden
# sets), so it follows project_type instead of being asked.
enable_structure_guard:
  type: bool
  default: "{{ scaffold_full_project and project_type in ['eval_suite', 'rag'] }}"
  when: false

python_version:
  type: str
  default: "3.12"
  when: false

aws_region:
  type: str
  default: eu-central-1
  when: false

expensive_command_patterns:
  type: str
  default: ""
  when: false

# Independent of scaffold_full_project — available in layering-only mode too.
# .agents/skills/ is a tool-agnostic agent-framework reference library (ADK +
# LangGraph scaffolding and patterns) shared across Claude, ADK's own tooling,
# or any other agent harness; also enables the /new-agent skill. Default off:
# its canonical home is this template and vendoring it into every render
# creates N drifting copies — opt in (-d) for offline/team-portability cases.
include_agent_reference_library:
  type: bool
  default: false
  when: false

# Maintainer knob: "vendored" copies this template's own snapshot of the
# shared workflow skills, last synced from the ~/.claude/skills/ reservoir via
# scripts/sync-global-skills.sh — portable, works for anyone who clones this
# template. Run that script first, then render, for the latest reservoir state.
global_skills_source:
  type: str
  choices:
    vendored: "vendored"
    none: "none"
  default: vendored
  when: false

_tasks:
  - "chmod +x {{ _copier_conf.dst_path }}/.claude/hooks/*.sh 2>/dev/null || true"
  - "{{ 'true' if include_mcp_server else 'rm -rf ' ~ _copier_conf.dst_path ~ '/mcp_servers' }}"
  - "{{ 'true' if include_agent_reference_library else 'rm -rf ' ~ _copier_conf.dst_path ~ '/.agents ' ~ _copier_conf.dst_path ~ '/.claude/skills/new-agent' }}"
  - >-
    {{ 'true' if global_skills_source == 'vendored' else 'rm -rf ' ~
    _copier_conf.dst_path ~ '/.claude/skills/quick-commit ' ~
    _copier_conf.dst_path ~ '/.claude/skills/quick-pr ' ~
    _copier_conf.dst_path ~ '/.claude/skills/review-pr ' ~
    _copier_conf.dst_path ~ '/.claude/skills/execute-tasks ' ~
    _copier_conf.dst_path ~ '/.claude/skills/scope-initiative ' ~
    _copier_conf.dst_path ~ '/.claude/skills/design-sprint ' ~
    _copier_conf.dst_path ~ '/.claude/skills/doc-to-linear-tickets ' ~
    _copier_conf.dst_path ~ '/.claude/skills/plan-review ' ~
    _copier_conf.dst_path ~ '/.claude/skills/research-review ' ~
    _copier_conf.dst_path ~ '/.claude/skills/execute-plan ' ~
    _copier_conf.dst_path ~ '/.claude/skills/code-review ' ~
    _copier_conf.dst_path ~ '/.claude/skills/code-debug ' ~
    _copier_conf.dst_path ~ '/.claude/skills/compact-session ' ~
    _copier_conf.dst_path ~ '/.claude/skills/define-milestones ' ~
    _copier_conf.dst_path ~ '/.claude/skills/github-projects ' ~
    _copier_conf.dst_path ~ '/.claude/skills/mcp-builder ' ~
    _copier_conf.dst_path ~ '/.claude/skills/plan-refactor ' ~
    _copier_conf.dst_path ~ '/.claude/skills/prototype ' ~
    _copier_conf.dst_path ~ '/.claude/skills/skill-creator' }}
  # akira is .claude-only (vendored skill + akira-scan agent definition) — no
  # product source. Guarded on include_* alone (not `(not scaffold_full_project)
  # or ...`): these skills/docs live under .claude/, which layering-only mode
  # DOES ship, so the removal must fire there too when the toggles are off —
  # unlike the _scaffold/ cleanups below, which layering mode discards
  # wholesale anyway.
  - "{{ 'true' if include_akira else 'rm -rf ' ~ _copier_conf.dst_path ~ '/.claude/skills/akira ' ~ _copier_conf.dst_path ~ '/.claude/agents/akira-scan.md' }}"
