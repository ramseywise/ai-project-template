  - "{{ ('mv ' ~ _copier_conf.dst_path ~ '/_scaffold/labs ' ~ _copier_conf.dst_path ~ '/') if (scaffold_full_project and include_ml_labs) else 'true' }}"
  # Same reasoning — railway.toml is rm -f'd above when split_service isn't chosen.
  - "{{ ('mv ' ~ _copier_conf.dst_path ~ '/_scaffold/railway.toml ' ~ _copier_conf.dst_path ~ '/') if (scaffold_full_project and frontend_backend_topology == 'split_service') else 'true' }}"
  # Same reasoning — promptfoo.config.yaml is rm -f'd by the include_promptfoo
  # cleanup task below when the toggle is off, so it can't be in the big
  # unconditional mv list either.
  - "{{ ('mv ' ~ _copier_conf.dst_path ~ '/_scaffold/promptfoo.config.yaml ' ~ _copier_conf.dst_path ~ '/') if (scaffold_full_project and include_promptfoo) else 'true' }}"
  # Separate mv (not part of the big one above) — ts_project_root only exists
  # when has_typescript is true, and the big mv's expression is built unconditionally
