# Migrations run ONLY on `copier update` (never on a fresh copy), after the new
# render lands. Unversioned entries run on every update; the shell guards below
# make each one idempotent (a no-op once the tree is already restructured), so
# no version tag is required — this repo doesn't tag releases yet.
_migrations:
  # core/ → core/pipelines/corpus/ restructure. The old render put the corpus
  # ETL modules at core/*.py; they now live at core/pipelines/corpus/*.py.
  # copier's 3-way merge adds the new paths but leaves the OLD core/*.py behind
  # whenever the developer had edited them (an unmodified file copier deletes
  # cleanly; a hand-edited one it keeps, orphaning it next to the new module and
  # breaking `from core.models import …`). This migration removes each stale
  # top-level module ONLY when (a) its replacement now exists under
  # core/pipelines/corpus/ and (b) the stale file has no uncommitted local
  # edits — a dirty stale file is left in place and flagged, so a developer's
  # work is never silently deleted. Idempotent: once core/*.py is gone it's a
  # no-op. Guarded on `git` being available and the project being a git repo;
  # outside git we can't tell edited from pristine, so we only warn.
  - >-
    sh -c '
    set -e;
    corpus="core/pipelines/corpus";
    [ -d "$corpus" ] || exit 0;
    in_git=0; git rev-parse --is-inside-work-tree >/dev/null 2>&1 && in_git=1;
    for f in README.md __main__.py index.py ingestion.py models.py preprocessing.py; do
      old="core/$f";
      [ -f "$old" ] || continue;
      [ -f "$corpus/$f" ] || continue;
      mod="${f%.py}";
      if [ "$in_git" = 0 ]; then
        echo "[migration] WARN: not a git repo, cannot tell edited from pristine — review $old vs $corpus/$f and remove $old by hand.";
      elif [ -n "$(git status --porcelain -- "$old" 2>/dev/null)" ]; then
        echo "[migration] WARN: $old has local edits, NOT removed — port them into $corpus/$f, delete $old, and repoint any \"from core.$mod import\" references.";
      else
        rm -f "$old" && echo "[migration] removed stale $old (moved to $corpus/$f).";
      fi;
    done
    '
  # DESIGN.md Key Decisions table ← design.yaml (Q7). The table between the
  # design-table markers is a VIEW of design.yaml; the prose around it is
  # human-owned. copier's 3-way merge is the wrong tool here — it would
  # conflict on every prose edit — so instead this rewrites ONLY the bytes
  # between the two markers, leaving all other bytes untouched. The script
  # itself is defensive: missing design.yaml/DESIGN.md, absent or reordered
  # markers, unparseable yaml, or a discovery stage that isn't `complete` all
  # warn and no-op rather than touching the file. Idempotent — re-running with
  # an unchanged design.yaml rewrites identical bytes. Guarded on python3
  # being available; without it the table simply stays as-is.
  - >-
    sh -c '
    [ -f design.yaml ] || exit 0;
    [ -f DESIGN.md ] || exit 0;
    [ -f .claude/scripts/render_design_table.py ] || exit 0;
    command -v python3 >/dev/null 2>&1 || {
      echo "[migration] WARN: python3 not found — DESIGN.md decisions table not regenerated from design.yaml.";
      exit 0;
    };
    python3 .claude/scripts/render_design_table.py .
    '
